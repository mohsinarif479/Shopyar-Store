<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout | Shopyar</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" href="assets/logo.jpg" />
  </head>
  <body>
    <header class="topbar"><div class="topbar-inner"><a class="brand" href="index.html"><img class="logo" src="assets/logo.jpg" alt="Shopyar logo" /><span class="brand-text">Shopyar</span></a><nav class="nav-links"><a href="shop.html">Shop</a><a href="cart.html">Cart</a></nav></div></header>
    <main class="checkout-page">
      <section class="checkout-shell">
        <form class="checkout-form checkout-main" id="checkout-form">
          <div class="checkout-brandline">
            <a class="brand" href="index.html"><img class="logo" src="assets/logo.jpg" alt="Shopyar logo" /><span class="brand-text">Shopyar</span></a>
            <a class="inline-link" href="index.html">Navigate to Online Store</a>
          </div>

          <section class="checkout-panel">
            <div class="checkout-heading"><h1>Checkout</h1><a class="inline-link" href="cart.html">Shopping cart</a></div>
            <h2>Contact email</h2>
            <label>Email address<input type="email" name="contact" autocomplete="email" required /></label>
            <label class="checkbox-row"><input type="checkbox" name="marketingOptIn" /> Email me with news and offers</label>
          </section>

          <section class="checkout-panel">
            <h2>Delivery</h2>
            <label>Country / Region<input type="text" name="country" value="Pakistan" required /></label>
            <div class="form-row">
              <label>First name<input type="text" name="firstName" required /></label>
              <label>Last name<input type="text" name="lastName" required /></label>
            </div>
            <label>Address<input type="text" name="address" required /></label>
            <label>Apartment, suite, etc. (optional)<input type="text" name="apartment" /></label>
            <div class="form-row">
              <label>City<input type="text" name="city" required /></label>
              <label>Postal code (optional)<input type="text" name="postalCode" /></label>
            </div>
            <label>Phone<input type="tel" name="phone" required /></label>
            <label class="checkbox-row"><input type="checkbox" name="saveInfo" /> Save this information for next time</label>
          </section>

          <section class="checkout-panel">
            <h2>Shipping method</h2>
            <div id="shipping-methods" class="shipping-methods"></div>
          </section>

          <section class="checkout-panel">
            <h2>Payment</h2>
            <p class="muted">All transactions are secure and encrypted.</p>
            <div class="payment-box"><strong>Cash on Delivery (COD)</strong><span>COD All Pakistan</span></div>
          </section>

          <section class="checkout-panel">
            <h2>Billing address</h2>
            <label class="radio-row"><input type="radio" name="billingAddress" value="same" checked /> Same as shipping address</label>
          </section>

          <section class="checkout-panel">
            <h2>Finalize order</h2>
            <label>Order notes<textarea name="notes" rows="2" placeholder="Any delivery instructions?"></textarea></label>
            <button class="btn btn-primary checkout-submit" type="submit">Submit</button>
          </section>
        </form>

        <aside class="checkout-summary-card">
          <h2>Order summary</h2>
          <div id="checkout-page-summary" class="checkout-summary"></div>
        </aside>
      </section>
    </main>
    <div id="toast" class="toast" hidden></div>
    <script src="script.js"></script>
  </body>
</html>
