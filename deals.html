<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Deals | Shopyar</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" href="assets/logo.jpg" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <button class="nav-toggle" aria-label="Open menu">☰</button>
        <a class="brand" href="index.html"><img class="logo" src="assets/logo.jpg" alt="Shopyar logo" /><span class="brand-text">Shopyar</span></a>
        <nav class="nav-links" aria-label="Main navigation"><a href="shop.html">Shop</a><a href="popular.html">Popular</a><a href="deals.html" class="active">Deals</a></nav>
        <div class="top-actions">
          <div class="search-wrap"><span class="search-icon">⌕</span><input id="site-search" class="search" placeholder="Search deals" aria-label="Search" /></div>
          <button class="cart" id="cart-toggle" type="button" aria-label="Cart">🛒<span class="cart-count" id="cart-count">0</span></button>
        </div>
      </div>
    </header>
    <div id="store-watermark" class="store-watermark" aria-hidden="true"></div>
    <main class="store-page">
      <section class="store-page-hero sale">
        <p class="eyebrow">Limited-time</p>
        <h1>Deals and sale highlights</h1>
        <p>Discounted products and seasonal offers in one focused shopping view.</p>
      </section>
      <section class="section">
        <div class="section-header"><div><p class="eyebrow">Savings</p><h2>Current offers</h2></div><select id="product-sort" class="sort-select"><option value="featured">Featured</option><option value="newest">Newest</option><option value="price-asc">Price low to high</option><option value="price-desc">Price high to low</option><option value="popular">Popular</option></select></div>
        <div id="sales-products" class="product-grid"></div>
      </section>
    </main>
    <div id="product-modal" class="modal" hidden><div class="modal-backdrop" data-close-modal="true"></div><div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modal-title"><button class="modal-close" data-close-modal="true" aria-label="Close">×</button><div id="modal-content"></div></div></div>
    <aside id="cart-drawer" class="cart-drawer" aria-hidden="true"><div class="cart-drawer-header"><h3>Your cart</h3><button class="modal-close" id="cart-close" type="button" aria-label="Close cart">×</button></div><div id="cart-items" class="cart-items"></div><div class="cart-drawer-footer"><div class="cart-total"><span>Total</span><strong id="cart-total">Rs 0</strong></div><button class="btn btn-primary" id="cart-checkout" type="button">Buy now</button></div></aside>
    <div id="toast" class="toast" hidden></div>
    <script src="script.js"></script>
  </body>
</html>
